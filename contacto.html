<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="estilo.css">
    <style>
        /* Estilo específico para los bloques de contacto */
        .contacto-box {
            max-width: 500px;
            margin: 20px 0;
            padding: 30px;
            border: 1px solid #333333;
            background-color: #000000;
        }

        .titulo-contacto {
            border-left: 3px solid #ffffff;
            padding-left: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 25px;
        }

        /* Botones estilo minimalista */
        .link-contacto {
            display: block;
            text-decoration: none;
            color: #999999;
            text-transform: none;
            letter-spacing: 2px;
            font-size: 12px;
            margin-bottom: 15px;
            padding: 10px 0;
            border-bottom: 1px solid #1a1a1a;
            transition: 0.4s;
        }

        .link-contacto:hover {
            color: #ffffff;
            border-bottom: 1px solid #ffffff;
            padding-left: 10px; /* Efecto de desplazamiento */
        }

        strong {
            color: #ffffff;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <div class="contacto-box">
        <h2 class="titulo-contacto">Contactame a traves de:</h2>
        
        <a href="mailto:diewko696@gmail.com" class="link-contacto">
            <strong>EMAIL:</strong> diewko696@gmail.com     
        </a>

        <a href="https://www.tiktok.com/@wailuluu" target="_blank" class="link-contacto">
            <strong>TIKTOK:</strong> Wailuluu - Warlokoo
        </a>

        <a href="https://chat.whatsapp.com/G7g8sI2zVDBIOOSra0qrRC?mode=gi_t" target="_blank" class="link-contacto">
            <strong>WHATSAPP:</strong> +591 78470554
        </a>
    </div>
	
</body>
</html>
