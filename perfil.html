<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="estilo.css">
    <style>
        /* Contenedor principal con el estilo  */
        .perfil-container {
            max-width: 700px;
            margin: 20px 0;
            padding: 30px;
            background-color: #000000; /* Fondo negro puro */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* Titulo principal con espaciado elegante */
        .perfil-title {
            border-left: 3px solid #ffffff; /* Borde blanco fino */
            padding-left: 15px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 20px;
            margin-bottom: 30px;
        }

        /* Estilo para la foto de perfil */
        .perfil-img {
            border: 1px solid #333333; /* Borde gris sutil */
            display: block;
            margin-bottom: 30px;
            width: 10cm; 
            height: 10cm;
            object-fit: cover;
            filter: grayscale(30%); /* Un toque de desaturación para el estilo técnico */
        }

        /* Bloque de datos académicos */
        .datos-perfil {
            border-top: 1px solid #1a1a1a;
            padding-top: 20px;
        }

        .dato-item {
            margin-bottom: 12px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999999; /* Gris suave para el texto secundario */
        }

        .dato-item strong {
            color: #ffffff; /* Blanco para resaltar las etiquetas */
            margin-right: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="perfil-container">
        <h2 class="perfil-title">Director Creativo</h2>
        
        <img src="foto.jpeg" class="perfil-img" alt="Foto de Organizador">

        <div class="datos-perfil">
            <div class="dato-item"><strong>Nombre:</strong> Diego Balderrama</div>
            <div class="dato-item"><strong>Ocupacion:</strong> Estudiante - Freelancer</div>
            <div class="dato-item"><strong>Grupo:</strong> TENACFILMS</div>
            <div class="dato-item"><strong>Nivel de Edicion:</strong> ALTO </div>
            <div class="dato-item"><strong>Hobbie:</strong> Streamming</div>
        </div>
    </div>
	
</body>
</html>
